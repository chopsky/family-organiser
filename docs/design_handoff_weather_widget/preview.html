<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Housemait — Weather widget (reference)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-app:#FAF7F2;
    --ink:#1A1620;
    --ink-2:#4A4453;
    --ink-3:#8A8493;
    --line:rgba(26,22,32,0.07);
    --brand:#6C3DD9;
    --brand-deep:#4A22A8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-app);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .ios-scroll::-webkit-scrollbar{display:none}
  .ios-scroll{scrollbar-width:none}
  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
  .phone{width:390px;max-width:100%;}
  .caption{max-width:390px;margin:0 auto 14px;font-size:12px;color:var(--ink-3);text-align:center;}
</style>
</head>
<body>
<div class="stage">
  <div>
    <div class="caption">Tap the card to expand · swipe the hourly row · the demo data is static</div>
    <div class="phone" id="root"></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="weather-widget.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(
    <WeatherStrip onOpenAI={()=>alert('Opens the AI composer in the real app')}/>
  );
</script>
</body>
</html>
