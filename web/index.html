    <!-- Cloudflare Turnstile — preconnect + preload so the bot-protection
         widget on Login / Signup / ForgotPassword is ready as fast as
         possible. The TurnstileWidget component still owns the actual
         <script> insert (with the right onload callback parameter); these
         hints just warm the browser's resource cache so the eventual fetch
         resolves from a connected origin. Saves ~200-500ms vs cold fetch.
         iOS native bypasses Turnstile so this is a no-op there. -->
    <link rel="preconnect" href="https://challenges.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

    <!-- Google Analytics with Consent Mode v2.
         The gtag script loads on every page so Google's tag verifier (and
         our own setup-time checks) can detect it. BEFORE config runs, we
         set every consent signal to "denied" — this means GA only sends
         cookieless, anonymised pings (no _ga cookies, no client ID, no
         personal data) until the user accepts the cookie banner. The
         pings let us see anonymous traffic shape; full GA4 events,
         cookies, and identifiers turn on via gtag('consent', 'update')
         called from web/src/lib/analytics.js when consent flips. This is
         the ICO-recognised pattern for PECR/UK-GDPR-compliant analytics.
         wait_for_update gives the JS bundle ~500ms to restore a prior
         "accepted" choice from localStorage before the first config ping
         fires, so returning visitors don't lose the page-view. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RY1QCM5JBG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        wait_for_update: 500
      });
      gtag('js', new Date());
      gtag('config', 'G-RY1QCM5JBG', { anonymize_ip: true });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
