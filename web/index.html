<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/housemait-favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/housemait-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6B3FA0" />
    <meta name="description" content="Housemait — family organiser for modern households." />
    <meta property="og:title" content="Housemait — Family Organiser" />
    <meta property="og:description" content="Coordinate calendars, grocery lists, meal plans, tasks and more — all in one place for modern families." />
    <meta property="og:image" content="https://www.housmait.com/housemait-logo2.png" />
    <meta property="og:url" content="https://www.housmait.com" />
    <meta property="og:type" content="website" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Housemait" />
    <link rel="manifest" href="/manifest.json" />
    <title>AI Family Organiser - Calendar, Tasks, Meals & Lists | Housemait</title>

    <!-- Instrument Serif for editorial display moments (Dashboard greeting). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" />

    <!-- Cloudflare Turnstile — preconnect + preload so the bot-protection
         widget on Login / Signup / ForgotPassword is ready as fast as
         possible. The TurnstileWidget component still owns the actual
         <script> insert (with the right onload callback parameter); these
         hints just warm the browser's resource cache so the eventual fetch
         resolves from a connected origin. Saves ~200-500ms vs cold fetch.
         iOS native bypasses Turnstile so this is a no-op there. -->
    <link rel="preconnect" href="https://challenges.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

    <!-- Google Analytics is loaded at runtime by web/src/lib/analytics.js
         once the user accepts the cookie banner. PECR / UK GDPR require an
         explicit opt-in before any non-essential tracker fires, so the
         gtag <script> deliberately doesn't appear inline here. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
