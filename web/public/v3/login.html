<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sign in | Housemait</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Caveat:wght@600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #FAF9F5; --paper-dim: #F1EFE7; --ink: #141310; --ink-60: rgba(20,19,16,.62);
      --sun: #FFC940; --tomato: #FF5A39; --plum: #6B3FA0; --plum-deep: #5A3488;
      --mint: #2EB872; --lilac: #C9B8FF;
      --border: 2px solid var(--ink); --pop: 5px 5px 0 var(--ink); --pop-sm: 3px 3px 0 var(--ink);
      --display: 'Space Grotesk', sans-serif; --body: 'DM Sans', sans-serif; --hand: 'Caveat', cursive;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--paper);
      color: var(--ink); font-family: var(--body); font-size: 16px;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: clip;
    }
    a { color: inherit; text-decoration: none; }

    .stage {
      flex: 1; display: grid; place-items: center;
      padding: 30px 20px 70px; position: relative;
    }

    /* Ambient fridge flotsam behind the card - decorative, dimmed so the
       form owns the page. Hidden on small screens. */
    .flot { position: absolute; font-family: var(--hand); font-size: 19px; line-height: 1.25; padding: 14px 16px 18px; border: var(--border); box-shadow: var(--pop-sm); width: 158px; opacity: .85; }
    .flot .pin { position: absolute; top: -10px; left: 50%; margin-left: -8px; width: 15px; height: 15px; border-radius: 50%; border: var(--border); }
    @media (max-width: 920px) { .flot { display: none; } }

    .card {
      width: 100%; max-width: 420px;
      background: #fff; border: var(--border); border-radius: 24px;
      box-shadow: 8px 8px 0 var(--ink);
      padding: 40px 38px 32px;
      position: relative; z-index: 1;
    }
    .card .mark { display: block; height: 52px; width: auto; margin: 0 auto 18px; }
    h1 {
      font-family: var(--display); font-weight: 700; letter-spacing: -.03em;
      font-size: 36px; line-height: 1.04; text-align: center; margin: 0;
    }
    h1 .hl {
      background-image: linear-gradient(100deg, var(--sun), var(--sun));
      background-repeat: no-repeat; background-size: 100% 42%; background-position: 0 80%;
    }
    .kettle { text-align: center; font-family: var(--hand); font-size: 21px; color: var(--ink-60); margin: 8px 0 26px; rotate: -1deg; }

    .sso { display: grid; gap: 11px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-family: var(--display); font-weight: 600; font-size: 15.5px;
      width: 100%; padding: 13px 20px; border-radius: 999px;
      border: var(--border); cursor: pointer; background: #fff; color: var(--ink);
      box-shadow: var(--pop-sm);
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
    }
    .btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--plum); }
    .btn-plum { background: var(--plum); color: #fff; }
    .btn-plum:hover { background: var(--plum-deep); box-shadow: 5px 5px 0 var(--sun); }

    .divider { display: flex; align-items: center; gap: 14px; margin: 22px 0; color: var(--ink-60); font-size: 13.5px; }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 2px dashed rgba(20, 19, 16, .18); }

    form { display: grid; gap: 14px; }
    label { font-family: var(--display); font-weight: 600; font-size: 13.5px; display: block; margin-bottom: 6px; }
    input {
      width: 100%; font-family: var(--body); font-size: 15.5px;
      padding: 12px 15px; border: var(--border); border-radius: 12px;
      background: var(--paper); color: var(--ink); outline: none;
      transition: box-shadow .14s ease, background .14s ease;
    }
    input::placeholder { color: rgba(20, 19, 16, .35); }
    input:focus { background: #fff; box-shadow: var(--pop-sm); border-color: var(--plum); }
    .row-between { display: flex; justify-content: space-between; align-items: baseline; }
    .forgot { font-size: 13px; color: var(--plum); font-weight: 500; }
    .forgot:hover { text-decoration: underline; }

    .below { text-align: center; margin-top: 22px; font-size: 14.5px; color: var(--ink-60); }
    .below a { color: var(--plum); font-weight: 600; }
    .below a:hover { text-decoration: underline; }

    footer { text-align: center; padding: 0 20px 26px; font-size: 12.5px; color: var(--ink-60); }
    footer a:hover { color: var(--plum); }

    @keyframes bob { 0%, 100% { translate: 0 0; } 50% { translate: 0 -7px; } }
    .flot.f1 { animation: bob 7s ease-in-out infinite; }
    .flot.f2 { animation: bob 6s ease-in-out 1.6s infinite; }
    @media (prefers-reduced-motion: reduce) { .flot { animation: none; } }
  </style>
</head>
<body>

  <div class="stage">
    <!-- ambient fridge notes, tucked behind the card -->
    <div class="flot f1" style="background: var(--sun); rotate: -5deg; left: calc(50% - 420px); top: 16%;" aria-hidden="true">
      <span class="pin" style="background: var(--tomato);"></span>
      swimming kit Thursday!!
    </div>
    <div class="flot f2" style="background: var(--lilac); rotate: 4deg; right: calc(50% - 430px); bottom: 18%;" aria-hidden="true">
      <span class="pin" style="background: var(--plum);"></span>
      bins out tonight
    </div>

    <div class="card">
      <img class="mark" src="housemait-logomark.png" alt="Housemait" />
      <h1>Welcome <span class="hl">back.</span></h1>
      <p class="kettle">the kettle's on</p>

      <div class="sso">
        <button class="btn" type="button">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.6 2.4 30.2 0 24 0 14.6 0 6.5 5.4 2.5 13.2l7.8 6.1C12.2 13.6 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.8C43.8 38 46.5 31.9 46.5 24.5z"/><path fill="#FBBC05" d="M10.3 28.7a14.5 14.5 0 0 1 0-9.4l-7.8-6.1a24 24 0 0 0 0 21.6l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.3-5.6l-7.4-5.8c-2.1 1.4-4.8 2.2-7.9 2.2-6.4 0-11.8-4.1-13.7-9.8l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
          Continue with Google
        </button>
        <button class="btn" type="button">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 12.54c-.03-3.05 2.49-4.51 2.6-4.58-1.42-2.07-3.62-2.36-4.4-2.39-1.87-.19-3.66 1.1-4.6 1.1-.95 0-2.42-1.07-3.98-1.04-2.05.03-3.94 1.19-4.99 3.02-2.13 3.7-.54 9.17 1.53 12.17 1.02 1.47 2.23 3.12 3.81 3.06 1.54-.06 2.12-.99 3.97-.99 1.85 0 2.38.99 3.99.96 1.65-.03 2.7-1.5 3.7-2.97 1.17-1.7 1.65-3.35 1.67-3.43-.04-.02-3.2-1.23-3.3-4.91zM14.02 3.6c.84-1.02 1.41-2.43 1.25-3.85-1.21.05-2.68.81-3.55 1.83-.78.9-1.46 2.35-1.28 3.73 1.36.11 2.74-.69 3.58-1.71z"/></svg>
          Continue with Apple
        </button>
      </div>

      <div class="divider">or with email</div>

      <form onsubmit="return false">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="username" />
        </div>
        <div>
          <div class="row-between">
            <label for="pw">Password</label>
            <a class="forgot" href="#">Forgot password?</a>
          </div>
          <input id="pw" type="password" placeholder="Your password" autocomplete="current-password" />
        </div>
        <button class="btn btn-plum" type="submit" style="margin-top: 6px;">Sign in</button>
      </form>

      <p class="below">New here? <a href="/signup">Start your free 30 days</a></p>
    </div>
  </div>

  <footer>
    <a href="/terms">Terms</a> · <a href="/privacy">Privacy</a>
  </footer>

</body>
</html>
