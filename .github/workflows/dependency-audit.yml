# .github/workflows/dependency-audit.yml
#
# Dependency vulnerability scanning
# Runs daily and on every push to main.
# Creates a GitHub issue if critical/high vulnerabilities are found.

name: Dependency Audit

on:
  schedule:
    - cron: "0 7 * * *" # Daily at 7am UTC
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "web/package.json"
      - "web/package-lock.json"
  workflow_dispatch: # Manual trigger

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit backend dependencies
        id: backend
        continue-on-error: true
        run: |
          echo "## Backend (src/)" > audit-report.txt
          echo "" >> audit-report.txt
          if npm audit --omit=dev 2>&1 | tee -a audit-report.txt | grep -q "found 0 vulnerabilities"; then
            echo "backend_clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_clean=false" >> "$GITHUB_OUTPUT"
          fi
          echo "" >> audit-report.txt

      - name: Audit frontend dependencies
        id: frontend
        continue-on-error: true
        run: |
          echo "## Frontend (web/)" >> audit-report.txt
          echo "" >> audit-report.txt
          if [ -f web/package.json ]; then
            cd web
            npm install --package-lock-only --ignore-scripts 2>/dev/null || true
            if npm audit --omit=dev 2>&1 | tee -a ../audit-report.txt | grep -q "found 0 vulnerabilities"; then
              echo "frontend_clean=true" >> "$GITHUB_OUTPUT"
            else
              echo "frontend_clean=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No web/package.json found — skipping" >> audit-report.txt
            echo "frontend_clean=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for critical/high vulnerabilities
        id: severity
        run: |
          if grep -qiE "(critical|high)" audit-report.txt; then
            echo "has_severe=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_severe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if vulnerabilities found
        if: steps.severity.outputs.has_severe == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.txt', 'utf8');
            const date = new Date().toISOString().split('T')[0];

            // Check for existing open issue to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependencies,security',
              state: 'open',
            });

            if (existing.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `## Updated scan — ${date}\n\n\`\`\`\n${report}\n\`\`\``,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Dependency vulnerabilities found — ${date}`,
                body: `## Dependency Audit Report\n\n\`\`\`\n${report}\n\`\`\`\n\nRun \`npm audit fix\` to resolve automatically fixable issues.`,
                labels: ['dependencies', 'security'],
              });
            }

      - name: Summary
        run: |
          echo "### Dependency Audit Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat audit-report.txt >> "$GITHUB_STEP_SUMMARY"
