# .github/workflows/claude-security-review.yml
#
# Claude Code Security & Quality Review for Housemait
# Runs automatically on every PR and can be triggered manually.
#
# SETUP:
# 1. Add your Anthropic API key as a GitHub secret:
#    Repo → Settings → Secrets → Actions → New repository secret
#    Name: ANTHROPIC_API_KEY
#    Value: sk-ant-api03-your-key-here
#
# 2. Copy this file to your repo at: .github/workflows/claude-security-review.yml
#
# 3. Commit and push — it will run on your next PR.

name: Claude Security & Quality Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for diff analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run security review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "
          You are a senior security engineer reviewing a UK-facing family organiser web app.
          The stack is: React 18 + Vite (frontend), Node.js + Express (backend), Supabase (PostgreSQL), 
          hosted on Vercel (frontend) and Railway (backend).

          Project structure:
          - src/          → Backend (Express API, routes, middleware)
          - web/          → Frontend (React app)
          - website/      → Marketing/public site
          - supabase/     → Database migrations, RLS policies, functions
          - scripts/      → Build/deploy scripts

          The app stores personal/family data and must comply with UK GDPR.
          It uses household-level data sharing — multiple users can belong to a household.

          Review the following changed files for:

          1. AUTHENTICATION & AUTHORISATION
             - Missing or weak auth checks on API routes
             - Horizontal privilege escalation (can Household A access Household B's data?)
             - Session/token handling issues
             - Missing rate limiting on sensitive endpoints

          2. INPUT VALIDATION & INJECTION
             - SQL injection risks (even with Supabase, check raw queries)
             - XSS vulnerabilities in user-facing inputs
             - File upload security (receipt scanning)
             - Unsanitised data in responses

          3. DATA PROTECTION (UK GDPR)
             - Personal data logged or exposed in error messages
             - Missing encryption for sensitive fields
             - Data retention concerns
             - Overly broad data queries (fetching more than needed)

          4. SECRETS & CONFIGURATION
             - Hardcoded API keys, tokens, or credentials
             - Environment variables exposed client-side
             - Insecure CORS configuration
             - Missing HTTPS enforcement

          5. CODE QUALITY & RELIABILITY
             - Unhandled promise rejections or missing try/catch
             - Race conditions in concurrent household operations
             - Missing error boundaries in React components
             - Performance concerns (N+1 queries, missing indexes)

          Changed files: ${{ steps.changed.outputs.files }}

          Format your response as a structured report:
          - CRITICAL: Issues that must be fixed before deployment
          - HIGH: Significant security or data protection risks
          - MEDIUM: Should be addressed soon
          - LOW: Minor improvements
          - PASSED: Areas that look good

          If you find no issues in a category, say so explicitly.
          Be specific — reference file names and line numbers where possible.
          " \
          --allowedTools "Read,Glob,Grep" \
          --output-format text \
          --max-turns 20 | tee review-output.txt

      - name: Post review as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review-output.txt', 'utf8');

            // Truncate if too long for a GitHub comment (max 65536 chars)
            const maxLen = 60000;
            const body = review.length > maxLen
              ? review.substring(0, maxLen) + '\n\n...(truncated — see full output in Actions log)'
              : review;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔒 Claude Security Review\n\n${body}`
            });

      - name: Upload full report
        uses: actions/upload-artifact@v4
        with:
          name: security-review-report
          path: review-output.txt
          retention-days: 30

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit dependencies
        continue-on-error: true
        run: |
          npm ci
          echo "## Dependency Audit" > audit-report.txt
          npm audit >> audit-report.txt 2>&1

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit-report.txt
          retention-days: 30
